[project]
name = "claude-chat-adapter"
version = "0.1.0"
description = "Adapter which wraps the autogenerated ai_chat_service client to the ai_chat_api.Client interface."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ai-chat-api",
    # The generated client will live in src/claude_chat_service_client; we import it directly via pytest pythonpath.
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/claude_chat_adapter"]

[tool.pytest.ini_options]
testpaths = ["tests"]
